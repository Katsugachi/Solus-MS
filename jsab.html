<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/jsab@main/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | JSB</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <style>
      body {
        cursor: url('Cursor.png'), auto;
        background-color: black;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #unityContainer {
        width: 100vw !important;
        height: 100vh !important;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
      }

      #loading-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        pointer-events: none;
      }

      #loading-label {
        color: #ffffff;
        font-size: 13px;
        font-family: monospace;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
        opacity: 0.7;
      }

      #loading-bar-wrap {
        width: 260px;
        height: 3px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 2px;
        overflow: hidden;
      }

      #loading-bar-fill {
        height: 100%;
        width: 0%;
        background: #ffffff;
        border-radius: 2px;
        transition: width 0.15s ease;
      }

      #loading-mb {
        color: #ffffff;
        font-size: 11px;
        font-family: monospace;
        letter-spacing: 0.06em;
        margin-top: 10px;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-label">LOADING</div>
      <div id="loading-bar-wrap">
        <div id="loading-bar-fill"></div>
      </div>
      <div id="loading-mb">0.00 MB / 132.83 MB</div>
    </div>

    <div class="webgl-content">
      <div id="unityContainer"></div>
    </div>

    <script>
      var overlay = document.getElementById("loading-overlay");
      var label = document.getElementById("loading-label");
      var barFill = document.getElementById("loading-bar-fill");
      var mbText = document.getElementById("loading-mb");

      var TOTAL_MB = 132.83;
      var TOTAL_BYTES = TOTAL_MB * 1024 * 1024;
      var loadedBytes = 0;

      function updateProgress() {
        var pct = Math.min(loadedBytes / TOTAL_BYTES * 100, 100);
        barFill.style.width = pct.toFixed(1) + "%";
        var mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        mbText.textContent = mbDone + " MB / " + TOTAL_MB.toFixed(2) + " MB";
      }

      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        let chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);
          updateProgress();
        }
        let fullBuffer = new Uint8Array(received);
        let offset = 0;
        for (let chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }
        return fullBuffer.buffer;
      }

      async function mergeFiles(fileParts, cacheKey) {
        const cache = await caches.open("jsab-cache");
        const cachedResponse = await cache.match(cacheKey);
        if (cachedResponse) {
          const blob = await cachedResponse.blob();
          loadedBytes += blob.size;
          updateProgress();
          return URL.createObjectURL(blob);
        }
        const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
        const mergedBlob = new Blob(buffers);
        const response = new Response(mergedBlob);
        await cache.put(cacheKey, response);
        return URL.createObjectURL(mergedBlob);
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }

      (async () => {
        const [dataUrl, wasmUrl, bundle] = await Promise.all([
          mergeFiles(getParts("Build/jsab.data.unityweb", 1, 4), "jsab.data.unityweb"),
          mergeFiles(getParts("Build/jsab.wasm.code.unityweb", 1, 2), "jsab.wasm.code.unityweb"),
          mergeFiles(getParts("StreamingAssets/aa/WebGL/fonts_tmp_assets_all_c2712a523e390d12249a703a5257c93b.bundle", 1, 3), "fonts_tmp_assets_all_c2712a523e390d12249a703a5257c93b.bundle"),
        ]);

        const originalOpen = XMLHttpRequest.prototype.open;
        const originalSend = XMLHttpRequest.prototype.send;

        XMLHttpRequest.prototype.open = function (method, url, ...rest) {
          this._requestUrl = url;
          if (url.includes("jsab.data.unityweb")) {
            url = dataUrl;
          } else if (url.includes("jsab.wasm.code.unityweb")) {
            url = wasmUrl;
          } else if (url.includes("fonts_tmp_assets_all_c2712a523e390d12249a703a5257c93b.bundle")) {
            url = bundle;
          } else if (url.includes(".bundle")) {
            overlay.style.display = "flex";
            label.textContent = url.split("/").pop().replace(".bundle", "");
          }
          this._modifiedUrl = url;
          return originalOpen.call(this, method, url, ...rest);
        };

        XMLHttpRequest.prototype.send = function (...args) {
          if (this._requestUrl && this._requestUrl.includes(".bundle")) {
            this.addEventListener("loadend", () => {
              overlay.style.display = "none";
            });
          }
          return originalSend.apply(this, args);
        };

        var unityInstance = UnityLoader.instantiate("unityContainer", "Build/jsab.json", { onProgress: UnityProgress });
        overlay.style.display = "none";
      })();
    </script>
  </body>
</html>
